<!DOCTYPE html>
<html lang="ms">
<head>
    <script>
        if (sessionStorage.getItem('admin_token') !== 'AUTHORIZED_IMANZ_2026') {
            window.location.replace("admin.html");
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETECT | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #0f1115; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .glass-card { background: #1c1f26; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        
        /* Navigation Styles */
        .nav-item { cursor: pointer; transition: 0.3s; border-radius: 16px; white-space: nowrap; }
        .nav-item.active { background: #22c55e; color: black; font-weight: 800; }
        
        /* Tab Visibility */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Sidebar Slide Logic */
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .sidebar-closed { transform: translateX(-240px); }
        .main-expanded { margin-left: -240px; }
    </style>
</head>
<body class="flex h-screen w-full">

    <aside id="sidebar" class="w-72 border-r border-white/5 p-6 flex flex-col gap-8 bg-[#0f1115] shrink-0">
        <div class="flex items-center gap-3 px-2">
            <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center min-w-[40px]">
                <i data-lucide="shield" class="text-black"></i>
            </div>
            <span class="font-extrabold text-xl tracking-tighter">DETECT v3</span>
        </div>

        <nav class="space-y-3">
            <div onclick="switchTab('dashboard', this)" class="nav-item active flex items-center gap-4 p-4">
                <i data-lucide="layout-grid"></i> <span>Dashboard</span>
            </div>
            <div onclick="switchTab('participants', this)" class="nav-item flex items-center gap-4 p-4 text-slate-500 hover:bg-white/5">
                <i data-lucide="users"></i> <span>Participants</span>
            </div>
            <div onclick="switchTab('monitoring', this)" class="nav-item flex items-center gap-4 p-4 text-slate-500 hover:bg-white/5">
                <i data-lucide="monitor-play"></i> <span>Monitoring</span>
            </div>
        </nav>

        <div class="mt-auto border-t border-white/5 pt-6">
            <div onclick="logoutAdmin()" class="flex items-center gap-4 p-4 text-red-500 hover:bg-red-500/10 rounded-xl cursor-pointer">
                <i data-lucide="power"></i> <span>Terminate</span>
            </div>
        </div>
    </aside>

    <button onclick="toggleSidebar()" class="fixed left-[260px] top-10 z-[60] bg-green-500 text-black p-2 rounded-full shadow-xl transition-all duration-400" id="btn-toggle">
        <i data-lucide="chevron-left" id="toggle-icon"></i>
    </button>

    <main id="main-content" class="flex-1 p-10 overflow-y-auto transition-all duration-400">

        <div id="tab-dashboard" class="tab-content active">
            <div class="glass-card p-10 relative overflow-hidden h-[300px] flex flex-col justify-center border-l-8 border-green-500">
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-green-500/10 rounded-full blur-3xl"></div>
                <h1 class="text-5xl font-extrabold mb-2 tracking-tighter">Welcome Back,</h1>
                <h2 class="text-3xl font-bold text-green-500 uppercase tracking-widest">Iman & Izzat</h2>
                <div class="mt-6 flex items-center gap-3">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">System Core: Operational</p>
                </div>
            </div>
        </div>

        <div id="tab-participants" class="tab-content">
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-12 lg:col-span-4">
                    <div class="glass-card p-8 border border-white/5">
                        <h3 class="font-extrabold text-xl mb-6 text-green-500 uppercase tracking-tighter">Generate Access</h3>
                        <div class="space-y-4">
                            <input type="text" id="pName" placeholder="Nama Peserta..." 
                                class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-green-500 text-white transition-all">
                            <button id="btnCreate" class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl transition shadow-lg shadow-green-500/20 uppercase">
                                Create Identity
                            </button>
                        </div>
                        <div id="status-msg" class="mt-4"></div>
                    </div>
                </div>
                <div class="col-span-12 lg:col-span-8">
                    <h3 class="font-bold mb-4 flex items-center gap-2 text-slate-500 uppercase text-xs tracking-[0.2em]">
                        <i data-lucide="database" class="w-4 h-4"></i> Registry Database
                    </h3>
                    <div id="account-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>

        <div id="tab-monitoring" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-green-500 uppercase tracking-tighter">Live Surveillance</h3>
                <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full border border-white/5">
                    <span id="active-count" class="text-green-500 text-xs font-black uppercase tracking-widest">0 Active Signals</span>
                </div>
            </div>
            <div id="monitor-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

    </main>

    <div id="cctv-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col items-center justify-center p-4">
        <div class="w-full max-w-5xl glass-card overflow-hidden border border-green-500/30">
            <div class="p-4 bg-white/5 flex justify-between items-center">
                <span id="target-id" class="text-[10px] font-black text-green-500 uppercase tracking-widest">Establishing Link...</span>
                <button onclick="closeVideo()" class="text-red-500 p-2"><i data-lucide="x"></i></button>
            </div>
            <div class="relative bg-black aspect-video flex items-center justify-center">
                <video id="remoteVideo" autoplay playsinline muted class="w-full h-full object-contain"></video>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCz5cj9VBeiunHIvxSSZNKXLr9MDZcnut0",
            authDomain: "detect-system-v3.firebaseapp.com",
            databaseURL: "https://detect-system-v3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "detect-system-v3",
            storageBucket: "detect-system-v3.firebasestorage.app",
            messagingSenderId: "18524075269",
            appId: "1:18524075269:web:dae72d517d9bc5cc89736c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // 2. INITIALIZE PEER (ADMIN)
        // ID ni kene sama dengan apa yang script peserta panggil
        const peer = new Peer('ADMIN_OPERATOR_IMANZ');

        // 3. UI FUNCTIONS (SWITCH TAB & SIDEBAR)
        window.switchTab = (tabName, el) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const target = document.getElementById('tab-' + tabName);
            if(target) target.classList.add('active');
            if(el) el.classList.add('active');
            lucide.createIcons();
        };

        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('btn-toggle');
            const icon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('sidebar-closed');
            btn.style.left = sidebar.classList.contains('sidebar-closed') ? "20px" : "260px";
            icon.setAttribute('data-lucide', sidebar.classList.contains('sidebar-closed') ? 'chevron-right' : 'chevron-left');
            lucide.createIcons();
        };

        // 4. MONITORING LOGIC (WATCH LIVE)
        window.watchLive = (userId) => {
            const modal = document.getElementById('cctv-modal');
            const video = document.getElementById('remoteVideo');
            const statusLabel = document.getElementById('target-id');

            modal.style.display = 'flex';
            statusLabel.innerText = "CONNECTING TO: " + userId;

            // Admin call peserta (null bermaksud kita tak hantar video kita, kita nak video dia je)
            const call = peer.call(userId, null);
            
            call.on('stream', (remoteStream) => {
                video.srcObject = remoteStream;
                statusLabel.innerText = "LIVE SIGNAL: " + userId;
                video.play().catch(e => console.log("Play error:", e));
            });

            call.on('error', (err) => {
                alert("Gagal sambung ke " + userId + ". Peserta mungkin dah offline.");
                window.closeVideo();
            });
        };

        window.closeVideo = () => {
            const modal = document.getElementById('cctv-modal');
            const video = document.getElementById('remoteVideo');
            modal.style.display = 'none';
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
        };

        // 5. FIREBASE SYNC (CREATE & LIST)
        document.getElementById('btnCreate').onclick = function() {
            const name = document.getElementById('pName').value.trim();
            if (!name) return;
            
            const pID = "ID-" + Math.floor(100 + Math.random() * 899);
            const pKey = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            set(ref(db, 'participants/' + pID), {
                name: name,
                pass: CryptoJS.SHA256(pKey).toString(),
                raw_key: pKey,
                status: "OFFLINE",
                created_at: serverTimestamp()
            }).then(() => {
                const msg = document.getElementById('status-msg');
                msg.innerHTML = `<div class="p-4 bg-green-500 text-black font-bold rounded-2xl text-xs text-center uppercase">Success Created!</div>`;
                document.getElementById('pName').value = "";
                setTimeout(() => { msg.innerHTML = ""; }, 3000);
            });
        };

        onValue(ref(db, 'participants'), (snapshot) => {
            const accList = document.getElementById('account-list');
            const monList = document.getElementById('monitor-list');
            const activeCount = document.getElementById('active-count');
            accList.innerHTML = ""; monList.innerHTML = "";
            let onlineTotal = 0;

            snapshot.forEach((child) => {
                const id = child.key;
                const data = child.val();
                const isOnline = data.status === "ONLINE";
                if(isOnline) onlineTotal++;

                // List Card
                const card = document.createElement('div');
                card.className = "glass-card p-5 border border-white/5 relative group";
                card.innerHTML = `
                    <div class="flex flex-col gap-1">
                        <p class="font-black text-green-500 text-sm uppercase">${data.name}</p>
                        <p class="text-[10px] text-slate-500">ID: ${id}</p>
                        <p class="text-[10px] text-slate-500">KEY: <span class="text-white font-bold">${data.raw_key}</span></p>
                        <p class="text-[9px] mt-2 font-black ${isOnline ? 'text-green-500 animate-pulse' : 'text-red-500'} uppercase">${data.status}</p>
                    </div>
                    <button onclick="deletePart('${id}')" class="absolute right-4 top-4 p-2 bg-red-500/10 text-red-500 rounded-xl opacity-0 group-hover:opacity-100 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>`;
                accList.appendChild(card);

                // Monitor Card
                if(isOnline) {
                    const monCard = document.createElement('div');
                    monCard.className = "glass-card p-6 border-b-4 border-green-500";
                    monCard.innerHTML = `
                        <h4 class="font-bold text-white mb-4 uppercase tracking-tighter">${data.name}</h4>
                        <button onclick="watchLive('${id}')" class="w-full bg-green-500 hover:bg-green-400 text-black py-3 rounded-xl font-black text-xs transition uppercase">
                            View Screen
                        </button>`;
                    monList.appendChild(monCard);
                }
            });
            activeCount.innerText = onlineTotal + " ACTIVE SIGNALS";
            lucide.createIcons();
        });

        window.deletePart = (id) => { if(confirm("Hapus " + id + "?")) remove(ref(db, 'participants/' + id)); };
        window.logoutAdmin = () => { sessionStorage.clear(); window.location.href = "admin.html"; };

        lucide.createIcons();
    </script>
</body>
</html>
